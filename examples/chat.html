<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bitgpu - 1-bit LLM chat, entirely in your browser</title>
  <style>
    :root { color-scheme: light dark; --bg: #fafafa; --fg: #18181b; --muted: #71717a; --card: #ffffff; --line: #e4e4e7; --accent: #2563eb; --user: #eff6ff; }
    @media (prefers-color-scheme: dark) { :root { --bg: #101012; --fg: #e4e4e7; --muted: #a1a1aa; --card: #18181b; --line: #27272a; --accent: #60a5fa; --user: #1e293b; } }
    * { box-sizing: border-box; }
    body { font: 15px/1.6 system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); max-width: 780px; margin: 0 auto; padding: 24px 16px 120px; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    h1 .tag { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 8px; }
    p.sub { color: var(--muted); margin: 0 0 16px; font-size: 13px; }
    a { color: var(--accent); }
    .bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    select, button, label { font: inherit; }
    select, button { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--line); background: var(--card); color: var(--fg); cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: default; }
    label.chk { display: inline-flex; gap: 6px; align-items: center; color: var(--muted); font-size: 13px; cursor: pointer; }
    #status { font-size: 13px; color: var(--muted); min-height: 20px; margin: 8px 0; }
    #status .err { color: #dc2626; }
    progress { width: 100%; height: 6px; accent-color: var(--accent); }
    #log { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
    .msg { padding: 10px 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--card); white-space: pre-wrap; overflow-wrap: anywhere; }
    .msg.user { background: var(--user); align-self: flex-end; max-width: 85%; }
    .msg.assistant { align-self: flex-start; max-width: 95%; }
    .msg .meta { display: block; font-size: 11px; color: var(--muted); margin-top: 6px; }
    form { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--line); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); }
    .row { display: flex; gap: 8px; max-width: 780px; margin: 0 auto; }
    input[type="text"] { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--line); background: var(--card); color: var(--fg); font: inherit; }
    code { background: var(--card); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-size: 12.5px; }
  </style>
</head>
<body>
  <h1>bitgpu chat <span class="tag">1-bit LLM · WebGPU · no server</span></h1>
  <p class="sub">
    The model runs entirely on your GPU via <a href="https://github.com/stfurkan/bitgpu">bitgpu</a>:
    weights stream once from the Hugging Face Hub, then everything is local. Nothing leaves this page.
  </p>
  <div class="bar">
    <select id="model">
      <option value="bonsai-1.7b">Bonsai 1.7B (~290 MB)</option>
      <option value="bonsai-4b">Bonsai 4B (~660 MB)</option>
      <option value="bonsai-8b">Bonsai 8B (~1.3 GB)</option>
    </select>
    <button id="load" class="primary">Load model</button>
    <label class="chk"><input type="checkbox" id="jsonMode" /> JSON mode (guaranteed-valid output)</label>
  </div>
  <div id="status">idle - pick a model and press Load.</div>
  <progress id="prog" value="0" max="1" hidden></progress>
  <div id="log"></div>
  <form id="form">
    <div class="row">
      <input type="text" id="prompt" placeholder="Load a model first..." autocomplete="off" disabled />
      <button id="send" class="primary" disabled>Send</button>
    </div>
  </form>

  <script type="module">
    // The demo pins the published package from a CDN so this single file runs anywhere
    // (GitHub Pages, any static host, or saved locally and served). For local development
    // against a checkout, use examples/verify.html instead.
    const BITGPU = 'https://esm.sh/bitgpu@0.7.0';
    // Small files (manifest + aux + tokenizer) from this repo / the Hub; the big weights file
    // streams straight from onnx-community's existing hosting, byte-for-byte unchanged.
    const REPO = 'https://cdn.jsdelivr.net/gh/stfurkan/bitgpu@main/models';
    const HF = (repo) => `https://huggingface.co/onnx-community/${repo}/resolve/main`;
    const MODELS = {
      'bonsai-1.7b': { hf: HF('Bonsai-1.7B-ONNX'), aux: 'bonsai.aux.bin' },
      'bonsai-4b': { hf: HF('Bonsai-4B-ONNX'), aux: 'model_q1.aux.bin' },
      'bonsai-8b': { hf: HF('Bonsai-8B-ONNX'), aux: 'model_q1.aux.bin' },
    };

    const $ = (id) => document.getElementById(id);
    const status = (html) => { $('status').innerHTML = html; };
    let engine = null, chat = null, busy = false;
    const messages = [];

    $('load').onclick = async () => {
      const key = $('model').value, m = MODELS[key];
      $('load').disabled = true; $('model').disabled = true;
      try {
        status('loading bitgpu...');
        const [{ createEngine, WebGPUUnavailableError }, { createChat }] = await Promise.all([
          import(BITGPU), import(`${BITGPU}/chat`),
        ]);
        status(`streaming ${key} weights from the Hugging Face Hub (cached by your browser)...`);
        $('prog').hidden = false;
        try {
          engine = await createEngine({
            manifestUrl: `${REPO}/${key}/manifest.json`,
            auxUrl: `${REPO}/${key}/${m.aux}`,
            dataUrl: `${m.hf}/onnx/model_q1.onnx_data`,
            kvCache: 'f16',
            onProgress: (p) => { if (p.total) { $('prog').value = p.loaded / p.total; } },
          });
        } catch (e) {
          if (e instanceof WebGPUUnavailableError) {
            status('<span class="err">WebGPU is not available in this browser. Try Chrome/Edge on desktop, or Safari 26+.</span>');
            $('load').disabled = false; $('model').disabled = false; $('prog').hidden = true;
            return;
          }
          throw e;
        }
        chat = await createChat(engine, {
          tokenizerJsonUrl: `${m.hf}/tokenizer.json`,
          tokenizerConfigUrl: `${m.hf}/tokenizer_config.json`,
        });
        $('prog').hidden = true;
        const cap = engine.capabilities;
        status(`ready - ${key} on ${cap.adapter.vendor ?? 'your GPU'} (${cap.useSubgroups ? 'subgroups' : 'fallback'} path, kv ${cap.kvCache}). Everything below runs locally.`);
        $('prompt').disabled = false; $('send').disabled = false; $('prompt').placeholder = 'Say something...'; $('prompt').focus();
      } catch (e) {
        $('prog').hidden = true;
        status(`<span class="err">load failed: ${e.message}</span>`);
        $('load').disabled = false; $('model').disabled = false;
      }
    };

    const bubble = (cls, text) => {
      const d = document.createElement('div');
      d.className = `msg ${cls}`;
      d.textContent = text;
      $('log').appendChild(d);
      d.scrollIntoView({ block: 'end' });
      return d;
    };

    $('form').onsubmit = async (ev) => {
      ev.preventDefault();
      if (!chat || busy) return;
      const q = $('prompt').value.trim();
      if (!q) return;
      $('prompt').value = '';
      busy = true; $('send').disabled = true;
      bubble('user', q);
      messages.push({ role: 'user', content: q });
      const out = bubble('assistant', '');
      try {
        const json = $('jsonMode').checked;
        const r = await chat.send(messages, {
          temperature: 0.5, topK: 20, repetitionPenalty: 1.1,
          maxTokens: json ? 256 : 512,
          format: json ? 'json' : undefined,
          promptLookup: json ? undefined : 'auto',
          onText: (d) => { out.textContent += d; out.scrollIntoView({ block: 'end' }); },
        });
        messages.push({ role: 'assistant', content: r.text });
        const meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = `${r.tokens.length} tokens · ${r.tokensPerSecond.toFixed(1)} tok/s · prefill ${r.prefillMs.toFixed(0)} ms${r.reusedCache ? ' (cache reused)' : ''}${json ? ` · finish: ${r.finishReason}` : ''}`;
        out.appendChild(meta);
      } catch (e) {
        out.textContent = `error: ${e.message}`;
        messages.pop();
      }
      busy = false; $('send').disabled = false; $('prompt').focus();
    };
  </script>
</body>
</html>
