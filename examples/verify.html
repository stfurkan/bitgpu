<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>bitgpu - package verification</title>
  <style>
    body { font: 14px/1.5 ui-monospace, monospace; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 18px; }
    button { font: inherit; padding: 8px 14px; cursor: pointer; }
    pre { background: #f4f4f5; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
    .pass { color: #166534; font-weight: 700; }
    .fail { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body>
  <h1>bitgpu - package verification</h1>
  <p>Imports the <b>built package</b> (<code>../dist/index.js</code>) and re-runs the bit-exact
     correctness + decode-throughput checks, to prove the extraction (TS port, inlined shaders,
     options API) is identical to the validated engine.</p>
  <button id="run">Run verification</button>
  <pre id="out">idle.</pre>

  <script type="module">
    import { createEngine, WebGPUUnavailableError } from '../dist/index.js';

    const out = document.getElementById('out');
    const log = (s) => { out.textContent += s + '\n'; };
    const buf = async (u) => await (await fetch(u)).arrayBuffer();
    const cos = (a, e) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < e.length; i++) { d += a[i] * e[i]; na += a[i] * a[i]; nb += e[i] * e[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9); };

    // ?model=<tag> selects a staged model + fixture set: ./model-<tag> with
    // ../test-fixtures/forward-<tag>. Default (no param) is the reference
    // Bonsai-1.7B in ./model with ../test-fixtures/forward. Each fixture set's
    // params.json carries its own known-good greedy continuation (bit-exact gate).
    const MODEL_TAG = new URLSearchParams(location.search).get('model') || '';
    const MODEL_DIR = MODEL_TAG ? `./model-${MODEL_TAG}` : './model';
    const FIX = MODEL_TAG ? `../test-fixtures/forward-${MODEL_TAG}` : '../test-fixtures/forward';

    async function run() {
      out.textContent = '';
      const fp = await (await fetch(`${FIX}/params.json`)).json();
      const ids = fp.ids;
      const KNOWN_GOOD = fp.known_good;
      if (!Array.isArray(KNOWN_GOOD) || KNOWN_GOOD.length === 0) { log(`ERROR: ${FIX}/params.json has no known_good ids`); return; }
      log(`loading model from ${MODEL_DIR} via the packaged engine...`);
      let engine;
      try {
        // ?nosg=1 forces the no-subgroup fallback path (fallback perf/correctness on SG hardware).
        const nosg = new URLSearchParams(location.search).get('nosg') === '1';
        engine = await createEngine({ modelUrl: MODEL_DIR, forceNoSubgroups: nosg, onProgress: (p) => log(`  [load] ${p.phase}`) });
      } catch (e) {
        if (e instanceof WebGPUUnavailableError) { log('WebGPU not available: ' + e.message); return; }
        throw e;
      }
      const cap = engine.capabilities;
      log(`path: ${cap.useSubgroups ? 'subgroups (SG=' + cap.subgroupSize + ')' : 'no-subgroup fallback'}  adapter: ${cap.adapter.vendor || '?'}/${cap.adapter.architecture || '?'}`);

      // 1) forward correctness vs reference fixtures
      log('\nchecking correctness vs reference...');
      const r = await engine.forward(ids);
      let ok = true;
      for (const name of ['embed', 'layer0', 'finalnorm', 'logits']) {
        const c = cos(r[name], new Float32Array(await buf(`${FIX}/${name}.bin`)));
        const pass = c > 0.999; ok = ok && pass;
        log(`  ${pass ? '[PASS]' : '[FAIL]'} ${name.padEnd(11)} cosine=${c.toFixed(7)}`);
      }

      // 2) generate + bit-exact id check
      log('\ngenerating 32 tokens...');
      const g = await engine.generate(ids, { maxTokens: 32 });
      const idsMatch = g.tokens.length === KNOWN_GOOD.length && g.tokens.every((t, i) => t === KNOWN_GOOD[i]);
      ok = ok && idsMatch;
      log(`first token = ${g.tokens[0]} (expect ${KNOWN_GOOD[0]}) ${g.tokens[0] === KNOWN_GOOD[0] ? 'OK' : 'MISMATCH'}`);
      log(`ids vs known-good: ${idsMatch ? '[PASS] identical' : '[FAIL] DIVERGED'}`);
      log(`prefill (TTFT, ${ids.length} tokens) = ${g.prefillMs.toFixed(0)} ms`);
      log(`decode = ${g.decodeMs.toFixed(0)} ms for ${g.tokens.length - 1} tokens  ->  ${g.tokensPerSecond.toFixed(2)} tok/s`);
      log(`  per-token breakdown: record=${g.timing.recordMs.toFixed(1)}ms  gpu=${g.timing.gpuMs.toFixed(1)}ms  readback=${g.timing.readbackMs.toFixed(1)}ms`);
      log(`generated ids: [${g.tokens.join(', ')}]`);

      // 3) per-kernel breakdown (diagnostic handle)
      log('\nin-context per-kernel breakdown...');
      const groups = {
        'layer matmul': ['matmul_split_sg', 'matmul_resid_mr_sg', 'matmul_swiglu_mr_sg', 'matmul_split_wg', 'matmul_resid_wg'],
        'lm_head': ['matmul_q2_sg', 'matmul_q2', 'matmul_q2_wg'],
        attention: ['attention_sg', 'attention_cache'],
        'norm+rope': ['rmsnorm_rope_sg', 'rope'],
        rmsnorm: ['rmsnorm_sg', 'rmsnorm'],
        'copy+swiglu': ['copy', 'swiglu'],
      };
      const none = await engine.profileDecode(ids, 12, new Set());
      log(`  skeleton (dispatch/barrier floor) = ${none.gpuMs.toFixed(1)} ms/token`);
      for (const [name, ks] of Object.entries(groups)) {
        const pr = await engine.profileDecode(ids, 12, new Set(ks));
        log(`  ${name.padEnd(10)} = ${Math.max(0, pr.gpuMs - none.gpuMs).toFixed(1)} ms/token`);
      }

      // 4) long-prompt prefill (tiled GEMM path). 800 tokens deliberately exceeds the point where a
      // per-element prefill kernel needs >65535 workgroups (swiglu = ceil(800*6144/64) = 76800), which
      // used to throw "Dispatch workgroup count exceeds max ... per dimension" - so this also proves
      // the 2D-grid dispatch fix.
      const long = []; while (long.length < 800) long.push(...ids);
      const lp = await engine.generate(long.slice(0, 800), { maxTokens: 2 });
      const lpOk = lp.tokens.length === 2;
      ok = ok && lpOk;
      log(`\nlong-prompt prefill (800 tokens) = ${lp.prefillMs.toFixed(0)} ms  ${lpOk ? '[PASS] no dispatch overflow' : '[FAIL] generation broke'}`);

      // 5) sampler (Phase 2): kernel diff vs CPU math, determinism, sampled tok/s
      log('\nsampler (do_sample) checks...');
      const SOPT = { temperature: 0.5, topK: 20, repetitionPenalty: 1.15, noRepeatNgramSize: 3 };
      // CPU emulation helpers (mirror sampler.ts; that math is headless bit-exact vs transformers.js)
      const affected = (h) => [...new Set(h)];
      const ngramBans = (h, n) => {
        if (h.length + 1 < n) return [];
        const gen = new Map();
        for (let j = 0; j < h.length + 1 - n; j++) {
          const ng = h.slice(j, j + n), key = JSON.stringify(ng.slice(0, n - 1));
          const arr = gen.get(key) || []; arr.push(ng[n - 1]); gen.set(key, arr);
        }
        return gen.get(JSON.stringify(h.slice(h.length + 1 - n, h.length))) || [];
      };
      const topKSort = (data, k) => { const idx = Array.from(data, (_, i) => i); idx.sort((a, b) => data[b] - data[a] || a - b); return idx.slice(0, k); };

      // (a) kernel diff: penalize the kernel's OWN base logits on the CPU and diff vs the GPU result
      const dbg = await engine.debugSampler(ids, SOPT);
      const cpu = dbg.base.slice();
      for (const id of affected(ids)) cpu[id] = cpu[id] < 0 ? cpu[id] * 1.15 : cpu[id] / 1.15;
      for (const id of ngramBans(ids, 3)) cpu[id] = -Infinity;
      let pmax = 0, pmis = 0;
      for (let i = 0; i < cpu.length; i++) {
        if (cpu[i] === -Infinity && dbg.penalized[i] === -Infinity) continue;
        const d = Math.abs(dbg.penalized[i] - cpu[i]);
        if (d > pmax) pmax = d;
        if (d > 1e-4) pmis++;
      }
      const penOk = pmis === 0; ok = ok && penOk;
      log(`  ${penOk ? '[PASS]' : '[FAIL]'} sampler_penalty kernel == CPU (maxdiff=${pmax.toExponential(1)}, mism=${pmis})`);
      const cpuTop = topKSort(cpu, 20);
      let candOk = true; for (let i = 0; i < 20; i++) if (dbg.candIds[i] !== cpuTop[i]) candOk = false;
      ok = ok && candOk;
      log(`  ${candOk ? '[PASS]' : '[FAIL]'} argmax_masked top-20 == CPU top-20`);

      // (b) determinism: same seed -> identical sequence twice
      const s1 = await engine.generate(ids, { ...SOPT, maxTokens: 24, seed: 42 });
      const s2 = await engine.generate(ids, { ...SOPT, maxTokens: 24, seed: 42 });
      const detOk = s1.tokens.length === s2.tokens.length && s1.tokens.every((t, i) => t === s2.tokens[i]);
      ok = ok && detOk;
      log(`  ${detOk ? '[PASS]' : '[FAIL]'} determinism (seed 42 identical twice)`);
      log(`  sampled ids (seed 42): [${s1.tokens.join(', ')}]`);
      log(`  sampled decode = ${s1.tokensPerSecond.toFixed(2)} tok/s (greedy was ${g.tokensPerSecond.toFixed(2)})`);

      // 6) cross-turn KV reuse (Phase 2b): a reused turn must equal a full prefill of the same sequence
      log('\ncross-turn KV reuse checks...');
      const R1 = 8, R2 = 8, delta = ids.slice(0, 5);
      engine.resetCache();
      const turn1 = await engine.generate(ids, { maxTokens: R1 });               // reset + full prefill
      const reuseT2 = await engine.generate(delta, { maxTokens: R2, reuseCache: true }); // append delta, reuse cache
      engine.resetCache();
      const fullSeq = [...ids, ...turn1.tokens, ...delta];
      const fullT2 = await engine.generate(fullSeq, { maxTokens: R2 });          // full prefill of the same total sequence
      const reuseOk = reuseT2.tokens.length === fullT2.tokens.length && reuseT2.tokens.every((t, i) => t === fullT2.tokens[i]);
      ok = ok && reuseOk;
      log(`  ${reuseOk ? '[PASS]' : '[FAIL]'} reuse turn-2 == full-prefill turn-2 (greedy, bit-exact)`);
      log(`    reuse: [${reuseT2.tokens.join(', ')}]`);
      log(`    full:  [${fullT2.tokens.join(', ')}]`);
      log(`    TTFT: reuse(delta ${delta.length}) ${reuseT2.prefillMs.toFixed(0)}ms vs full(${fullSeq.length}) ${fullT2.prefillMs.toFixed(0)}ms`);
      // sampled reuse (the worker's actual path): greedy turn-1 to fix the state, then sampled turn-2
      // with a fixed seed; reuse must still equal a full prefill (tests cross-turn penalty history + cache)
      const SS = { temperature: 0.5, topK: 20, repetitionPenalty: 1.15, noRepeatNgramSize: 3, seed: 7 };
      engine.resetCache();
      const sT1 = await engine.generate(ids, { maxTokens: R1 });
      const sReuseT2 = await engine.generate(delta, { ...SS, maxTokens: R2, reuseCache: true });
      engine.resetCache();
      const sFullT2 = await engine.generate([...ids, ...sT1.tokens, ...delta], { ...SS, maxTokens: R2 });
      const sReuseOk = sReuseT2.tokens.length === sFullT2.tokens.length && sReuseT2.tokens.every((t, i) => t === sFullT2.tokens[i]);
      ok = ok && sReuseOk;
      log(`  ${sReuseOk ? '[PASS]' : '[FAIL]'} sampled reuse turn-2 == full-prefill turn-2 (seed 7)`);

      // 6c) prefill() primitive (system-prompt prewarming): prefill(prefix) + reuse(delta) must equal
      // a COLD full prefill of [prefix, ...delta], token-for-token - the exact property the worker's
      // load-time prewarm relies on (prefill the system block, then the first turn reuses it).
      log('\nprefill() prewarm checks...');
      const split = Math.max(1, ids.length - 3), PFX = ids.slice(0, split), APP = ids.slice(split);
      engine.resetCache();
      await engine.prefill(PFX);                                                   // warm the prefix, no decode
      const pwReuse = await engine.generate(APP, { maxTokens: R2, reuseCache: true });
      engine.resetCache();
      const pwCold = await engine.generate([...PFX, ...APP], { maxTokens: R2 });    // cold full prefill of the same
      const pwOk = pwReuse.tokens.length === pwCold.tokens.length && pwReuse.tokens.every((t, i) => t === pwCold.tokens[i]);
      ok = ok && pwOk;
      log(`  ${pwOk ? '[PASS]' : '[FAIL]'} prefill(prefix)+reuse == cold full-prefill (greedy, bit-exact)`);
      engine.resetCache();
      await engine.prefill(PFX);
      const pwSReuse = await engine.generate(APP, { ...SS, maxTokens: R2, reuseCache: true });
      engine.resetCache();
      const pwSCold = await engine.generate([...PFX, ...APP], { ...SS, maxTokens: R2 });
      const pwSOk = pwSReuse.tokens.length === pwSCold.tokens.length && pwSReuse.tokens.every((t, i) => t === pwSCold.tokens[i]);
      ok = ok && pwSOk;
      log(`  ${pwSOk ? '[PASS]' : '[FAIL]'} sampled prefill(prefix)+reuse == cold (seed 7)`);
      engine.resetCache();

      // 6d) growable KV cache: a reuse turn that crosses the initial capacity (512) must GROW the
      // cache, preserve the prior K/V, and still equal a cold full prefill of the same total sequence.
      log('\ngrowable KV cache check (reuse turn crosses 512)...');
      const bigT1 = []; while (bigT1.length < 504) bigT1.push(...ids); // first turn just under the 512 floor
      const bigDelta = ids.slice(0, 30);                               // appended turn pushes the cache past 512
      engine.resetCache();
      const gT1 = await engine.generate(bigT1, { maxTokens: 4 });      // fill the cache near 512 (no growth yet)
      const gReuse = await engine.generate(bigDelta, { maxTokens: 8, reuseCache: true }); // crosses 512 -> grows
      engine.resetCache();
      const gCold = await engine.generate([...bigT1, ...gT1.tokens, ...bigDelta], { maxTokens: 8 });
      const growOk = gReuse.tokens.length === gCold.tokens.length && gReuse.tokens.every((t, i) => t === gCold.tokens[i]);
      ok = ok && growOk;
      log(`  ${growOk ? '[PASS]' : '[FAIL]'} reuse-across-growth == cold full-prefill (bit-exact, ${bigT1.length}->${bigT1.length + gT1.tokens.length + bigDelta.length} tok)`);
      engine.resetCache();

      // 6e) prompt-lookup speculative decoding: output must be IDENTICAL to normal decoding
      // (greedy AND sampled with the same seed); it may only be faster.
      log('\nprompt-lookup speculative decoding checks...');
      engine.resetCache();
      const pg = await engine.generate(ids, { maxTokens: 32, promptLookup: true });
      const pgOk = pg.tokens.length === g.tokens.length && pg.tokens.every((t, i) => t === g.tokens[i]);
      ok = ok && pgOk;
      const pgs = pg.speculation ?? { steps: 0, drafted: 0, accepted: 0 };
      log(`  ${pgOk ? '[PASS]' : '[FAIL]'} pld greedy == greedy  (${pg.tokensPerSecond.toFixed(2)} vs ${g.tokensPerSecond.toFixed(2)} tok/s; ${pgs.steps} steps, ${pgs.accepted}/${pgs.drafted} drafts accepted)`);
      engine.resetCache();
      const ps = await engine.generate(ids, { ...SOPT, maxTokens: 24, seed: 42, promptLookup: true });
      const psOk = ps.tokens.length === s1.tokens.length && ps.tokens.every((t, i) => t === s1.tokens[i]);
      ok = ok && psOk;
      const pss = ps.speculation ?? { steps: 0, drafted: 0, accepted: 0 };
      log(`  ${psOk ? '[PASS]' : '[FAIL]'} pld sampled (seed 42) == sampled  (${ps.tokensPerSecond.toFixed(2)} vs ${s1.tokensPerSecond.toFixed(2)} tok/s; ${pss.steps} steps, ${pss.accepted}/${pss.drafted} accepted)`);
      engine.resetCache();
      const pldT1 = await engine.generate(ids, { maxTokens: 8, promptLookup: true });
      const pldDelta = ids.slice(0, 5);
      const pldT2 = await engine.generate(pldDelta, { maxTokens: 8, reuseCache: true, promptLookup: true });
      engine.resetCache();
      const pldCold = await engine.generate([...ids, ...pldT1.tokens, ...pldDelta], { maxTokens: 8 });
      const prOk = pldT2.tokens.length === pldCold.tokens.length && pldT2.tokens.every((t, i) => t === pldCold.tokens[i]);
      ok = ok && prOk;
      log(`  ${prOk ? '[PASS]' : '[FAIL]'} pld reuse turn-2 == cold full-prefill turn-2 (greedy, bit-exact)`);
      engine.resetCache();
      // promptLookup:'auto': probation then keep-or-bail; output must be IDENTICAL to plain
      // decoding either way. The fixture content is below both break-evens, so these exercise
      // the bail + continuation paths (greedy handoff, and the sampled RNG mid-stream handoff).
      const ag = await engine.generate(ids, { maxTokens: 32, promptLookup: 'auto' });
      const agOk = ag.tokens.length === g.tokens.length && ag.tokens.every((t, i) => t === g.tokens[i]);
      ok = ok && agOk;
      log(`  ${agOk ? '[PASS]' : '[FAIL]'} pld auto greedy == greedy  (bailed=${ag.speculation?.bailed}, ${ag.tokensPerSecond.toFixed(2)} vs ${g.tokensPerSecond.toFixed(2)} tok/s)`);
      engine.resetCache();
      const as = await engine.generate(ids, { ...SOPT, maxTokens: 32, seed: 42, promptLookup: 'auto' });
      engine.resetCache();
      const asPlain = await engine.generate(ids, { ...SOPT, maxTokens: 32, seed: 42 });
      const asOk = as.tokens.length === asPlain.tokens.length && as.tokens.every((t, i) => t === asPlain.tokens[i]);
      ok = ok && asOk;
      log(`  ${asOk ? '[PASS]' : '[FAIL]'} pld auto sampled (seed 42) == sampled  (bailed=${as.speculation?.bailed}, ${as.tokensPerSecond.toFixed(2)} vs ${asPlain.tokensPerSecond.toFixed(2)} tok/s)`);
      engine.resetCache();

      // 6f) greedy with processors: repetition_penalty / no_repeat_ngram apply under greedy search
      // too (like transformers.js), picking the penalized argmax with NO RNG involvement - so the
      // output must be deterministic without a seed and identical across the plain and PLD paths.
      log('\ngreedy-with-processors checks...');
      const GP = { maxTokens: 24, repetitionPenalty: 1.15, noRepeatNgramSize: 3 };
      engine.resetCache();
      const gp1 = await engine.generate(ids, GP);
      engine.resetCache();
      const gp2 = await engine.generate(ids, GP);
      const gpDet = gp1.tokens.length === gp2.tokens.length && gp1.tokens.every((t, i) => t === gp2.tokens[i]);
      ok = ok && gpDet;
      log(`  ${gpDet ? '[PASS]' : '[FAIL]'} greedy+penalties deterministic (no RNG, no seed)`);
      engine.resetCache();
      const gpPld = await engine.generate(ids, { ...GP, promptLookup: true });
      const gpPldOk = gpPld.tokens.length === gp1.tokens.length && gpPld.tokens.every((t, i) => t === gp1.tokens[i]);
      ok = ok && gpPldOk;
      log(`  ${gpPldOk ? '[PASS]' : '[FAIL]'} pld greedy+penalties == greedy+penalties (bit-exact)`);
      engine.resetCache();

      // maxTokens: 0 = prefill-only turn: emits nothing, and a reuse turn continues from it
      // exactly as if the whole sequence had been prefilled cold.
      const z = await engine.generate(ids, { maxTokens: 0 });
      const zT2 = await engine.generate(delta, { maxTokens: 8, reuseCache: true });
      engine.resetCache();
      const zCold = await engine.generate([...ids, ...delta], { maxTokens: 8 });
      const zOk = z.tokens.length === 0 && zT2.tokens.length === zCold.tokens.length && zT2.tokens.every((t, i) => t === zCold.tokens[i]);
      ok = ok && zOk;
      log(`  ${zOk ? '[PASS]' : '[FAIL]'} maxTokens:0 prefills only (${z.tokens.length} tokens emitted) and reuse continues bit-exact`);
      engine.resetCache();

      // An oversized maxTokens CLAMPS to the window (no throw); only a prompt that itself
      // exceeds maxSeqLen throws, and it must throw BEFORE touching the reuse state.
      let guardOk = false;
      const huge = []; while (huge.length <= 2048) huge.push(...ids);
      try { await engine.generate(huge, { maxTokens: 4 }); } catch (e) { guardOk = /maxSeqLen/.test(e.message); }
      ok = ok && guardOk;
      log(`  ${guardOk ? '[PASS]' : '[FAIL]'} length guard throws when the prompt exceeds maxSeqLen (oversized maxTokens clamps)`);
      engine.resetCache();

      // 7) chat layer (bitgpu/chat): the tokenizer files live next to the manifest; model dirs
      // without them (e.g. an app that loads its tokenizer from the Hub) skip loudly. Checks:
      // seeded determinism, stream==send, reuse turn == cold prefill of the exact same token
      // sequence (proves the delta construction + eos bookkeeping end-to-end on real hardware),
      // and think-block stripping.
      const tokHead = await fetch(`${MODEL_DIR}/tokenizer.json`, { method: 'HEAD' });
      if (!tokHead.ok) {
        log('\nchat layer checks SKIPPED (no tokenizer.json in the model dir)');
      } else {
        log('\nchat layer (bitgpu/chat) checks...');
        const { createChat } = await import('../dist/chat.js');
        const chat = await createChat(engine, { modelUrl: MODEL_DIR });
        const CMSG = [{ role: 'user', content: 'The capital of France is Paris. The capital of Japan is' }];
        const CSEED = { seed: 42, temperature: 0.5, topK: 20, maxTokens: 24 };
        chat.reset();
        const c1 = await chat.send(CMSG, CSEED);
        chat.reset();
        const c2 = await chat.send(CMSG, CSEED);
        const cDet = c1.text.length > 0 && c1.text === c2.text;
        ok = ok && cDet;
        log(`  ${cDet ? '[PASS]' : '[FAIL]'} chat seeded determinism (${c1.tokens.length} tokens, ${c1.tokensPerSecond.toFixed(1)} tok/s)`);
        chat.reset();
        const cIt = chat.stream(CMSG, CSEED);
        let cAcc = '', cFin;
        for (;;) { const n = await cIt.next(); if (n.done) { cFin = n.value; break; } cAcc += n.value; }
        const cStream = cAcc === cFin.text && cFin.text === c1.text;
        ok = ok && cStream;
        log(`  ${cStream ? '[PASS]' : '[FAIL]'} chat stream() deltas == send() text`);
        chat.reset();
        const t1 = await chat.send(CMSG, CSEED);
        const t2 = await chat.send([...CMSG, { role: 'assistant', content: t1.text }, { role: 'user', content: 'And the capital of Germany?' }], CSEED);
        engine.resetCache();
        const cCold = await engine.generate([...t1.inputTokenIds, ...t1.tokens, ...t2.inputTokenIds], { ...CSEED, stopTokens: [chat.eosTokenId] });
        const cReuse = t2.reusedCache && t2.tokens.length === cCold.tokens.length && t2.tokens.every((t, i) => t === cCold.tokens[i]);
        ok = ok && cReuse;
        log(`  ${cReuse ? '[PASS]' : '[FAIL]'} chat reuse turn-2 == cold prefill of the same token sequence (bit-exact, reused=${t2.reusedCache})`);
        chat.reset();
        const cTh = await chat.send(CMSG, { ...CSEED, maxTokens: 48, think: true });
        const cThinkOk = !cTh.text.includes('<think>') && !cTh.text.includes('</think>');
        ok = ok && cThinkOk;
        log(`  ${cThinkOk ? '[PASS]' : '[FAIL]'} chat think turn keeps tags out of the reply (${cTh.thinkText.length} think chars)`);
        chat.reset();
        // format:'json' - constrained decoding on real hardware: the reply must parse, be
        // complete (finishReason 'stop'), and be seed-deterministic. Two prompts: one that asks
        // for JSON (filter mostly confirms the model), one that invites PROSE (the filter must
        // force structure from the first token - this exercises the full-vocab fallback path).
        const jq = [{ role: 'user', content: 'Describe France as JSON with keys capital (string) and population_millions (number).' }];
        const j1 = await chat.send(jq, { format: 'json', seed: 42, temperature: 0.5, maxTokens: 96 });
        chat.reset();
        const j2 = await chat.send(jq, { format: 'json', seed: 42, temperature: 0.5, maxTokens: 96 });
        chat.reset();
        let jParsed = null; try { jParsed = JSON.parse(j1.text); } catch { /* jParsed stays null */ }
        const jOk = jParsed !== null && typeof jParsed === 'object' && j1.finishReason === 'stop' && j1.text === j2.text;
        ok = ok && jOk;
        log(`  ${jOk ? '[PASS]' : '[FAIL]'} chat json mode parses + complete + deterministic (${j1.tokens.length} tokens, ${j1.tokensPerSecond.toFixed(1)} tok/s vs sampled ${s1.tokensPerSecond.toFixed(1)})`);
        log(`    json: ${j1.text.slice(0, 120)}`);
        const jp = await chat.send([{ role: 'user', content: 'Tell me about your day.' }], { format: 'json', seed: 7, temperature: 0.5, maxTokens: 96 });
        chat.reset();
        let jpParsed = null; try { jpParsed = JSON.parse(jp.text); } catch { /* stays null */ }
        const jpOk = jpParsed !== null && jp.finishReason === 'stop';
        ok = ok && jpOk;
        log(`  ${jpOk ? '[PASS]' : '[FAIL]'} chat json mode forces structure on a prose prompt (${jp.tokens.length} tokens)`);
        // schema enforcement on real hardware: exactly 3 {name: string, population: number}
        // items - the model CANNOT return one object, stop early, or drift keys/types.
        const CITY_SCHEMA = { type: 'array', minItems: 3, maxItems: 3, items: { type: 'object', required: ['name', 'population'], additionalProperties: false, properties: { name: { type: 'string' }, population: { type: 'number' } } } };
        // greedy: deterministic per model (the plain json checks above cover the sampled path)
        const js = await chat.send([{ role: 'user', content: 'The 3 largest cities in Turkey with their populations.' }], { format: { json: { schema: CITY_SCHEMA } }, maxTokens: 256 });
        chat.reset();
        let jsParsed = null; try { jsParsed = JSON.parse(js.text); } catch { /* stays null */ }
        const jsOk = Array.isArray(jsParsed) && jsParsed.length === 3 && jsParsed.every((x) => typeof x === 'object' && typeof x.name === 'string' && typeof x.population === 'number' && Object.keys(x).length === 2) && js.finishReason === 'stop';
        ok = ok && jsOk;
        log(`  ${jsOk ? '[PASS]' : '[FAIL]'} chat json schema enforced (3 items, exact keys/types, ${js.tokens.length} tokens, ${js.tokensPerSecond.toFixed(1)} tok/s)`);
        log(`    schema'd: ${js.text.replace(/\s+/g, ' ').slice(0, 110)}`);
        // tool calling on real hardware. The FORCED path is the guaranteed one: the reply must be
        // exactly one <tool_call> block naming the tool with schema-valid arguments (the forced
        // first token also exercises the full-vocab fallback when <tool_call> is not in the
        // top-K). Greedy for per-model determinism, checked by running twice.
        const WEATHER = [{ type: 'function', function: { name: 'get_weather', description: 'Get the current weather for a city.', parameters: { type: 'object', required: ['city'], additionalProperties: false, properties: { city: { type: 'string' }, unit: { enum: ['celsius', 'fahrenheit'] } } } } }];
        const tq = [{ role: 'user', content: 'What is the weather in Paris right now?' }];
        chat.reset();
        const f1 = await chat.send(tq, { tools: WEATHER, toolChoice: { name: 'get_weather' }, maxTokens: 64 });
        chat.reset();
        const f2 = await chat.send(tq, { tools: WEATHER, toolChoice: { name: 'get_weather' }, maxTokens: 64 });
        const fCall = f1.toolCalls.length === 1 ? f1.toolCalls[0] : null;
        const fOk = fCall !== null && fCall.name === 'get_weather' && typeof fCall.arguments.city === 'string' && fCall.arguments.city.length > 0
          && Object.keys(fCall.arguments).every((k) => k === 'city' || k === 'unit')
          && f1.text === '' && f1.finishReason === 'tool_calls'
          && JSON.stringify(f1.toolCalls) === JSON.stringify(f2.toolCalls);
        ok = ok && fOk;
        log(`  ${fOk ? '[PASS]' : '[FAIL]'} chat forced tool call (schema-valid args, deterministic, ${f1.tokens.length} tokens, ${f1.tokensPerSecond.toFixed(1)} tok/s)`);
        log(`    call: ${JSON.stringify(fCall && { name: fCall.name, arguments: fCall.arguments })}`);
        // round trip: the tool-result turn must EXTEND the KV cache, and (when the model answers
        // in prose) be bit-exact vs a cold prefill of the exact same token sequence - the same
        // proof as the plain-chat reuse check.
        chat.reset();
        const w1 = await chat.send(tq, { tools: WEATHER, toolChoice: { name: 'get_weather' }, maxTokens: 64 });
        const w2 = await chat.send([...tq, { role: 'assistant', content: w1.text, tool_calls: w1.toolCalls }, { role: 'tool', content: '{"temp_c": 21, "sky": "clear"}' }], { tools: WEATHER, maxTokens: 48 });
        engine.resetCache();
        const wCold = await engine.generate([...w1.inputTokenIds, ...w1.tokens, ...w2.inputTokenIds], { maxTokens: 48, stopTokens: [chat.eosTokenId] });
        const wBitOk = w2.toolCalls.length > 0 || (w2.tokens.length === wCold.tokens.length && w2.tokens.every((t, i) => t === wCold.tokens[i]));
        const wOk = w2.reusedCache && wBitOk && (w2.text.length > 0 || w2.toolCalls.length > 0);
        ok = ok && wOk;
        log(`  ${wOk ? '[PASS]' : '[FAIL]'} chat tool round trip: result turn reuses cache${w2.toolCalls.length ? '' : ', bit-exact vs cold'} (reused=${w2.reusedCache})`);
        log(`    after tool: ${(w2.text || JSON.stringify(w2.toolCalls)).replace(/\s+/g, ' ').slice(0, 100)}`);
        // auto mode is model judgment (whether it calls is not gated); the STRUCTURE must still
        // be clean either way - valid calls only, tags never in the visible text.
        chat.reset();
        const a1 = await chat.send([{ role: 'user', content: 'Use the get_weather tool to check the weather in Tokyo.' }], { tools: WEATHER, maxTokens: 96 });
        const aOk = a1.toolCalls.every((c) => c.name === 'get_weather' && typeof c.arguments === 'object') && !a1.text.includes('<tool_call>');
        ok = ok && aOk;
        log(`  ${aOk ? '[PASS]' : '[FAIL]'} chat auto tools: ${a1.toolCalls.length ? `called with ${JSON.stringify(a1.toolCalls[0].arguments).slice(0, 60)}` : 'answered in prose (model judgment; structure clean)'}`);
        chat.reset();
      }

      // 8) f16 KV cache mode (kvCache: 'f16'). Within-mode behavior must stay EXACT (determinism,
      // reuse == cold); vs f32 the outputs may legitimately differ after a divergence point, so
      // agreement with the f32 engine is gated loosely and reported as a measurement.
      const hasF16 = (await navigator.gpu.requestAdapter()).features.has('shader-f16');
      if (hasF16) {
        log('\nf16 KV cache checks (second engine, kvCache: f16)...');
        const e16 = await createEngine({ modelUrl: MODEL_DIR, kvCache: 'f16', forceNoSubgroups: new URLSearchParams(location.search).get('nosg') === '1' });
        const capOk = e16.capabilities.kvCache === 'f16';
        ok = ok && capOk;
        log(`  ${capOk ? '[PASS]' : '[FAIL]'} capabilities.kvCache = ${e16.capabilities.kvCache}`);
        // forward correctness vs the f32 reference fixtures (cosine thresholds)
        const r16 = await e16.forward(ids);
        for (const name of ['embed', 'layer0', 'finalnorm', 'logits']) {
          const c = cos(r16[name], new Float32Array(await buf(`${FIX}/${name}.bin`)));
          const pass = c > 0.999; ok = ok && pass;
          log(`  ${pass ? '[PASS]' : '[FAIL]'} forward ${name.padEnd(9)} cosine=${c.toFixed(7)}`);
        }
        // within-mode exactness: determinism + reuse == cold full prefill
        const d1 = await e16.generate(ids, { ...SOPT, maxTokens: 24, seed: 42 });
        const d2 = await e16.generate(ids, { ...SOPT, maxTokens: 24, seed: 42 });
        const detOk16 = d1.tokens.length === d2.tokens.length && d1.tokens.every((t, i) => t === d2.tokens[i]);
        ok = ok && detOk16;
        log(`  ${detOk16 ? '[PASS]' : '[FAIL]'} f16 determinism (seed 42 identical twice)`);
        e16.resetCache();
        const rt1 = await e16.generate(ids, { maxTokens: 8 });
        const rt2 = await e16.generate(ids.slice(0, 5), { maxTokens: 8, reuseCache: true });
        e16.resetCache();
        const rc2 = await e16.generate([...ids, ...rt1.tokens, ...ids.slice(0, 5)], { maxTokens: 8 });
        const rOk16 = rt2.tokens.length === rc2.tokens.length && rt2.tokens.every((t, i) => t === rc2.tokens[i]);
        ok = ok && rOk16;
        log(`  ${rOk16 ? '[PASS]' : '[FAIL]'} f16 reuse turn-2 == full-prefill turn-2 (exact within mode)`);
        // f32 vs f16 token agreement (greedy): compare continuations until first divergence.
        // Gate: the fixture prompt must agree for >= 24 of 32; the rest is reported measurement.
        e16.resetCache(); engine.resetCache();
        let agreeSum = 0, agreeN = 0;
        const probes = [ids, [...ids, ...ids], ids.slice(0, 7)];
        for (const pr of probes) {
          const a = await engine.generate(pr, { maxTokens: 32 });
          const b = await e16.generate(pr, { maxTokens: 32 });
          let n = 0; while (n < a.tokens.length && n < b.tokens.length && a.tokens[n] === b.tokens[n]) n++;
          agreeSum += n; agreeN += a.tokens.length;
          log(`  agreement (greedy 32, prompt ${pr.length} tok): ${n}/${a.tokens.length}${n === a.tokens.length ? ' identical' : ' then diverged'}`);
          e16.resetCache(); engine.resetCache();
        }
        const aFix = await e16.generate(ids, { maxTokens: 32 });
        let nFix = 0; while (nFix < 32 && aFix.tokens[nFix] === KNOWN_GOOD[nFix]) nFix++;
        const aOk = nFix >= 24;
        ok = ok && aOk;
        log(`  ${aOk ? '[PASS]' : '[FAIL]'} f16 vs known-good ids: ${nFix}/32 prefix (total agreement ${agreeSum}/${agreeN})`);
        log(`  f16 decode ${aFix.tokensPerSecond.toFixed(2)} tok/s (f32 was ${g.tokensPerSecond.toFixed(2)})`);
        e16.dispose();
      } else log('\nf16 KV cache checks SKIPPED (no shader-f16 on this adapter)');

      out.insertAdjacentHTML('beforeend', `\n<span class="${ok ? 'pass' : 'fail'}">${ok ? 'PACKAGE OK' : 'REGRESSION'} - greedy ${g.tokensPerSecond.toFixed(2)} / sampled ${s1.tokensPerSecond.toFixed(2)} tok/s</span>`);
    }

    document.getElementById('run').onclick = () => run().catch(e => log('ERROR: ' + e.message + '\n' + e.stack));
  </script>
</body>
</html>
