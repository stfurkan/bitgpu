name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:sampler
      - run: npm run test:pld
      - run: npm run test:chat
      - run: npm run check:publish
      # The GPU bit-exactness gate (npm run verify:headless) needs real WebGPU hardware
      # and the model weights; run it locally before every release (see README).
